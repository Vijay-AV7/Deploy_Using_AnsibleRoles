- name: "Installing dependencies of package.json"
  ansible.builtin.npm:
    path: /app

# - name: "configuring backend as service"
#   ansible.builtin.copy: #Here if we use copy module then src will refer files
#     src: backend.service 
#     dest: /etc/systemd/system/backend.service

- name: "configuring backend as service"
  ansible.builtin.template:
    src: backend.service.j2 #Here if we use template module then src will refer template
    dest: /etc/systemd/system/backend.service
  notify: #Notify when some change event happened and redirect to handler and execute the handler
    - Starting and enabling backend

- name: "Creating expense user"
  ansible.builtin.user:
    user: expense

- name: "Loading schema"
  community.mysql.mysql_db:
    name: all
    state: import
    login_user: "{{ MYSQL_USER }}"
    login_password: "{{ MYSQL_PASSWORD }}"
    login_host: "{{ MYSQL_HOST }}"
    target: /app/schema/backend.sql

- name: "restarting and enabling backend"
  tags:
    - deployment
  ansible.builtin.service:
    name: backend
    daemon-reload: true
    state: restarted



- name: "Disabling default NodeJS version"
  ansible.builtin.command: "dnf module disable nodejs -y"

- name: "enabling NodeJS version:20"
  ansible.builtin.command: "dnf module enable nodejs:20 -y"

- name: "Installing Nodejs and Mysql"
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - nodejs
    - mysql

- name: "Installing packages"
  ansible.builtin.pip:
    name: "{{ item }}"
    state: present
    executable: pip3.9
  loop:
    - PyMySQL
    - cryptography

- name: "Importing common role for Downloading the file and placing in /app directory"
  # tags:
  #   - deployment
  ansible.builtin.include_role:
    name: common
    tasks_from: main


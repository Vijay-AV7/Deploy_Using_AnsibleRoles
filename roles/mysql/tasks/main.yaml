- name: "Installing mysql-server"
  ansible.builtin.package:
    name: mysql-server
    state: present

- name: "Enabling and starting mysql-server"
  ansible.builtin.service:
    name: mysqld
    enabled: yes
    state: started

- name: "Installing python dependencies boto3 and botocore"
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
    - boto3
    - botocore
    - cryptography
    - PyMySQL

# - name: "AWS SSM Key"
#   ansible.builtin.debug:
#     msg: "{{  }}"
#   register: AWS_SSM

- name: "Login to Database server with Rootpassword"
  community.mysql.mysql_info: 
    name: mysql
    login_user: root
    login_password: "{{ mysql_password }}"
    login_host: mysql.vijaydev.space
  register: mysql_info
  ignore_errors: true

- name: "Setup Root Password"
  ansible.builtin.command: "mysql_secure_installation --set-root-pass {{ mysql_password }} "
  when: mysql_info.failed is true
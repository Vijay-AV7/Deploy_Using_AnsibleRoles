- name: "Download backend files"
  tags:
    - deployment
  ansible.builtin.get_url:
    url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-{{ FILE_TYPE }}-v2.zip
    dest: /tmp/{{ FILE_TYPE }}.zip

- name: "Creating directory '{{ APP_LOCATION }}'"
  tags:
    - deployment
  ansible.builtin.file:
    state: directory
    path: "{{ APP_LOCATION }}"

- name: "Unzip the code in '{{ APP_LOCATION }}'"
  tags:
    - deployment
  ansible.builtin.unarchive:
    src: /tmp/{{ FILE_TYPE }}.zip
    dest: "{{ APP_LOCATION }}"
    remote_src: yes